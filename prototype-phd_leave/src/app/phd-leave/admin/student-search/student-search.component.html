<div class="student-search animate-in">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header__left">
      <h1 class="page-header__title" id="search-heading">Student Directory</h1>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-card">
    <div class="search-input-wrapper">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        class="search-input"
        placeholder="Search by name or roll number"
        [formControl]="searchControl"
        id="student-search-input"
        autocomplete="off"
      />
    </div>
  </div>

  <!-- Results -->
  <div class="results-section" *ngIf="hasSearched">
    <div class="results-list" *ngIf="results.length > 0">
      <button
        class="result-card"
        *ngFor="let student of results"
        (click)="navigateToProfile(student)"
        [id]="'result-' + student.rollNumber"
      >
        <div class="result-card__avatar">{{ student.initials }}</div>
        <div class="result-card__info">
          <span class="result-card__name">{{ student.name }}</span>
          <span class="result-card__details">{{ student.rollNumber }} · {{ student.program }} · {{ student.department }}</span>
        </div>
        <svg class="result-card__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>

    <!-- No Results -->
    <div class="empty-results" *ngIf="results.length === 0">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <span>No students found matching your search.</span>
    </div>
  </div>

  <!-- Pre-search state -->
  <div class="pre-search" *ngIf="!hasSearched">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <span class="pre-search__text">Start typing to search for students…</span>
  </div>
</div>
