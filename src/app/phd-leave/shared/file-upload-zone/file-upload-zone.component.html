<div
  class="upload-zone"
  [class.drag-over]="isDragOver"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  *ngIf="!selectedFile"
>
  <div class="upload-zone__icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
  </div>
  <div class="upload-zone__text">
    Drag &amp; drop your medical certificate here, or
    <label class="upload-zone__browse" for="file-upload-input">
      <strong>browse</strong>
      <input
        type="file"
        id="file-upload-input"
        [accept]="accept"
        (change)="onFileInputChange($event)"
        class="upload-zone__file-input"
        aria-label="Upload medical certificate"
      />
    </label>
  </div>
  <div class="upload-zone__hint">PDF, JPG, or PNG — max {{ maxSizeMB }} MB</div>
</div>

<!-- Selected file display -->
<div class="upload-zone__file" *ngIf="selectedFile">
  <div class="upload-zone__file-info">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span>{{ selectedFile.name }}</span>
    <span class="upload-zone__file-size">({{ formatFileSize(selectedFile.size) }})</span>
  </div>
  <button
    class="upload-zone__file-remove"
    (click)="removeFile()"
    aria-label="Remove uploaded file"
    type="button"
  >×</button>
</div>

<!-- Error message -->
<div class="upload-zone__error" *ngIf="errorMessage">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
  </svg>
  {{ errorMessage }}
</div>
