<aside class="sidebar" id="sidebar">
  <!-- Logo -->
  <div class="sidebar__logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="10" fill="#006565"/>
      <text x="8" y="25" font-size="18" font-weight="700" fill="white" font-family="Inter">A</text>
    </svg>
    <span class="sidebar__logo-text">AXIS</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">
    <!-- Top-level placeholder links -->
    <a class="sidebar__link--top disabled" aria-label="Home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
    <a class="sidebar__link--top disabled">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      <span>Courses</span>
    </a>
    <a class="sidebar__link--top disabled">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Attendance</span>
    </a>

    <!-- Divider -->
    <div class="sidebar__divider"></div>

    <!-- Student Singular Link -->
    <a
      *ngIf="currentMode === 'student'"
      class="sidebar__link--top"
      routerLink="/phd-leave/dashboard"
      routerLinkActive="active"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 10 3 12 0v-5"/>
      </svg>
      <span>PHD-LEAVE</span>
    </a>

    <!-- Admin Collapsible Group -->
    <div class="sidebar__group" [class.active-parent]="true" *ngIf="currentMode === 'admin'">
      <button
        class="sidebar__group-trigger"
        (click)="toggleGroup()"
        [attr.aria-expanded]="isExpanded"
        aria-label="Toggle PhD Leave navigation"
      >
        <div class="sidebar__group-trigger-left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 10 3 12 0v-5"/>
          </svg>
          <span>{{ groupLabel }}</span>
        </div>
        <svg class="sidebar__chevron" [class.collapsed]="!isExpanded" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <div class="sidebar__group-children" [class.collapsed]="!isExpanded">
        <ng-container *ngFor="let item of navItems">

          <!-- Admin nav icons -->
          <a
            *ngIf="item.icon === 'search'"
            class="sidebar__child-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [id]="'nav-' + item.icon"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span>{{ item.label }}</span>
          </a>

          <a
            *ngIf="item.icon === 'pending'"
            class="sidebar__child-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [id]="'nav-' + item.icon"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>{{ item.label }}</span>
          </a>
        </ng-container>
      </div>
    </div>
  </nav>

  <!-- User + Mode Switch -->
  <div class="sidebar__user">
    <div class="sidebar__user-info">
      <div class="avatar">{{ studentInitials }}</div>
      <div class="sidebar__user-details">
        <span class="sidebar__user-name">{{ studentName }}</span>
        <span class="sidebar__user-role">{{ studentRole }}</span>
      </div>
    </div>
    <button
      class="sidebar__mode-switch"
      (click)="switchMode()"
      id="mode-switch-btn"
      [attr.aria-label]="switchLabel"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/>
        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
      </svg>
      <span>{{ switchLabel }}</span>
    </button>
  </div>
</aside>
